[package]
name = "amll-player-core"
version = "0.1.0"
edition = "2024"

[features]
default = []

[dependencies]
anyhow = "^1.0"
concat-string = "^1.0"
cpal = "^0.17"
futures = "0.3"
md5 = "^0.8"
rb = "^0.4"
ringbuf = "^0.5"
arrayvec = "^0.7"
segmap = "0.1"
serde = { version = "^1.0", features = ["derive"] }
serde_json = "^1.0"
spectrum-analyzer = "1.5"
tokio = { version = "^1", features = [
    "time",
    "macros",
    "sync",
    "rt",
    "rt-multi-thread",
] }
tracing = "0.1"
easer = "0.3.0"
dispatch = "0.2.0"
tauri = "2.6.2"
rodio = { version = "0.22", features = [] }
parking_lot = "0.12"

ffmpeg_audio = { git = "https://github.com/apoint123/ffmpeg-audio.git", rev = "dfd17b062303403b86a9bb0c509ee03aed3cbade" }
now-playing-controls = { git = "https://github.com/apoint123/now-playing-controls.git" }


[dev-dependencies]
tracing-subscriber = "0.3"

[build-dependencies]
